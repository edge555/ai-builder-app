name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      # Build shared first — other workspaces depend on it
      - run: npm run build --workspace=@ai-app-builder/shared

      - run: npm run lint --workspace=@ai-app-builder/backend
        continue-on-error: true  # pre-existing console/import-order warnings in test files

      - run: npm test --workspace=@ai-app-builder/shared
      - run: npm test --workspace=@ai-app-builder/backend
