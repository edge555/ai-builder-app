  <!-- Critical above-the-fold CSS: design tokens + loading skeleton.
       Prevents FOUC while JS bundles load. Duplicated from index.css and PageSkeleton.css. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --background: 35 14% 98%;
      --foreground: 0 0% 4%;
      --muted-foreground: 0 0% 45%;
      --primary: 20 67% 50%;
      --border: 0 0% 90%;
    }
    [data-theme="dark"] {
      --background: 240 10% 4%;
      --foreground: 0 0% 98%;
      --muted-foreground: 240 5% 65%;
      --primary: 17 80% 54%;
      --border: 240 4% 16%;
    }
    html, body, #root { height: 100%; width: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }
    .page-skeleton {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; height: 100dvh; gap: 0.75rem;
      font-size: 0.875rem; color: hsl(var(--muted-foreground));
      background: hsl(var(--background));
    }
    .page-skeleton-spinner {
      width: 18px; height: 18px;
      border: 2px solid hsl(var(--muted-foreground) / 0.25);
      border-top-color: hsl(var(--primary));
      border-radius: 50%;
      animation: ps-spin 0.8s linear infinite;
    }
    @keyframes ps-spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
